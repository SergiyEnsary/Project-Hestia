services:
  hestia:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: "10001:10001"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      HESTIA_CONFIG: /run/hestia/config.yaml
      HESTIA_HOST: 0.0.0.0
      HESTIA_PORT: "8000"
    volumes:
      - ./config.yaml:/run/hestia/config.yaml:ro
      - ./.env:/run/hestia/.env:ro
      - hestia-data:/var/lib/hestia
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  hestia-data:
